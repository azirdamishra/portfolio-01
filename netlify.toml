# Proxy Substack RSS feed to avoid CORS
[[redirects]]
  from = "/api/feed"
  to = "https://drizzywhiz.substack.com/feed"
  status = 200
  force = true

# Proxy Lox interpreter API (Render-hosted) to avoid CORS
[[redirects]]
  from   = "/api/lox/*"
  to     = "https://lox-core-api.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
